name: IPBar
options:
  bundleIdPrefix: com.ipbar
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.38.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    SWIFT_STRICT_CONCURRENCY: complete
targets:
  IPBar:
    type: application
    platform: macOS
    sources:
      - path: IPBar
        excludes:
          - "*.xcassets/*/.*"
    dependencies:
      - sdk: CoreWLAN.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ipbar.IPBar
        PRODUCT_NAME: IPBar
        INFOPLIST_FILE: IPBar/Info.plist
        ENABLE_APP_SANDBOX: false
        CODE_SIGN_ENTITLEMENTS: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: true
